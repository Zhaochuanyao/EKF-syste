# demo_vehicle_accuracy.yaml — 车辆场景 EKF 跟踪与轨迹预测

_base_: configs/base.yaml

runtime:
  frame_skip: 1
  device: cpu

detector:
  model: yolov8s
  weights: weights/yolov8s.pt
  conf: 0.4
  classes: [2, 3, 5, 7]   # car, motorcycle, bus, truck
  max_det: 50
  min_area: 1600.0
  min_short_side: 30.0
  min_aspect: 0.3
  max_aspect: 8.0
  border_margin: 3.0

tracker:
  n_init: 2               # 2帧确认，减少碎片化
  max_age: 40             # 容忍遮挡约 1.6s @25fps

  high_conf_threshold: 0.5
  low_conf_threshold: 0.15
  gating_threshold_confirmed: 18.47    # chi2(0.999, df=4)，更宽松减少断轨
  cost_iou_weight: 0.5
  cost_mahal_weight: 0.3
  cost_center_weight_confirmed: 0.2
  cost_threshold_a: 0.75
  iou_threshold_b: 0.25
  iou_threshold_c: 0.2
  center_norm: 300.0

  lost_recovery_stage: true
  cost_threshold_a2: 1.0

  min_create_score: 0.65
  anchor_mode: center

ekf:
  process_noise:
    std_acc: 1.0           # Singer model 加速度（px/s²），仅保留耦合结构，数值影响极小
    std_yaw_rate: 0.4      # 角速度变化标准差（rad/s）
    std_size: 0.1          # 尺寸变化标准差
    std_pos: 2.0           # 直接位置噪声（px/step），稳态增益 K≈0.1~0.3
    std_vel: 3.0           # 直接速度噪声（px/s/step），对应车辆正常加减速幅度
    lost_age_q_scale: 1.50
  measurement_noise:
    std_cx: 6.0            # 检测中心 x 噪声（px）
    std_cy: 6.0            # 检测中心 y 噪声（px）
    std_w: 10.0            # 检测宽度噪声（px）
    std_h: 10.0            # 检测高度噪声（px）
    score_adaptive: true
    size_adaptive: false
    border_adaptive: false
    aspect_adaptive: false
  initial_covariance:
    std_cx: 10.0
    std_cy: 10.0
    std_v: 30.0            # 初始速度不确定性大
    std_theta: 1.0         # 初始航向完全未知
    std_omega: 0.5
    std_w: 15.0
    std_h: 10.0

prediction:
  future_steps: [1, 3, 5, 7, 10]
  min_hits_for_prediction: 2
  max_position_cov_trace: 2000.0
  fixed_lag_smoothing: true
  smoothing_lag: 5
  smoothing_alpha: 0.20    # EMA alpha，平衡平滑与响应

output:
  output_dir: outputs/vehicle_accuracy/
