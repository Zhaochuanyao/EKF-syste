# EKF CTRV 跟踪器配置
tracker:
  # 时间步长
  dt: 0.04              # 1/25s，对应25fps视频
  auto_dt: true         # 从视频FPS自动估算dt

  # EKF 状态向量: [cx, cy, v, theta, omega, w, h]
  state_dim: 7
  # 观测向量: [cx, cy, w, h]
  meas_dim: 4

  # 过程噪声
  process_noise:
    std_acc: 2.0
    std_yaw_rate: 0.5
    std_size: 0.1

  # 观测噪声
  measurement_noise:
    std_cx: 5.0
    std_cy: 5.0
    std_w: 10.0
    std_h: 10.0
    score_adaptive: true

  # 初始协方差对角元素标准差
  initial_covariance:
    std_cx: 10.0
    std_cy: 10.0
    std_v: 5.0
    std_theta: 0.5
    std_omega: 0.2
    std_w: 20.0
    std_h: 20.0

  # 数值稳定性
  omega_threshold: 0.001
