# 数据关联配置
association:
  # 第一阶段：高分检测框关联
  iou_threshold: 0.3
  max_iou_distance: 0.7
  max_mahal_distance: 9.4877   # chi2(0.95, df=4)
  gating_threshold: 9.4877

  # 代价融合
  cost_iou_weight: 0.5
  cost_mahal_weight: 0.5
  center_norm: 200.0            # 中心距离归一化因子（像素）

  # Stage A2：Lost 轨迹专项恢复通道（车辆关键）
  # 跳过 Mahal 硬门控，只用 IoU + 中心距离，给 Lost 轨迹第二次匹配机会
  lost_recovery_stage: true
  cost_threshold_a2: 0.9

  # 第二阶段：低分检测框关联（仅IoU）
  second_stage_match: true
  second_stage_conf: 0.1
  second_stage_iou_threshold: 0.5
